name: Sync Hostaway → data.json

on:
  schedule:
    - cron: '17 5 * * *'   # tous les jours ~07h17 (heure de Paris)
  workflow_dispatch:        # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: sync-hostaway
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Générer data.json depuis Hostaway
        env:
          HOSTAWAY_ACCOUNT_ID: ${{ secrets.HOSTAWAY_ACCOUNT_ID }}
          HOSTAWAY_API_KEY: ${{ secrets.HOSTAWAY_API_KEY }}
        run: BUILD_DATE=$(date +%F) python3 build_data.py

      - name: Commit si changement
        run: |
          if ! git diff --quiet -- data.json; then
            git config user.name "sh-sync-bot"
            git config user.email "bot@sh-developpement.fr"
            git add data.json
            git commit -m "chore: mise à jour data.json (sync Hostaway quotidien)"
            git push
            echo "data.json mis à jour et publié."
          else
            echo "Aucun changement détecté."
          fi
