<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Nos locations en Bourgogne — SH Développement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: { cream:'#FBF8F3', sand:'#F1E9DC', ecru:'#ecdbc0', ink:'#2E2410', brown:'#463618', cocoa:'#5c4636', muted:'#6B605C', gold:'#E0AE2C', bronze:'#8A5E1A' },
  fontFamily: { display:['"Cormorant Garamond"','Georgia','serif'], sans:['Inter','system-ui','sans-serif'] },
  maxWidth: { content:'1180px' }
}}}
</script>
<style>
  body{font-family:Inter,system-ui,sans-serif}
  .font-display{font-family:"Cormorant Garamond",Georgia,serif}
  .tracking-luxe{letter-spacing:.28em}
  a,button{transition:all .2s ease}
  .card-img{transition:transform .5s ease}
  .grp:hover .card-img{transform:scale(1.05)}
</style>
</head>
<body class="bg-cream text-ink antialiased">

<header class="border-b border-ecru/70 bg-cream/90 backdrop-blur sticky top-0 z-30">
  <div class="max-w-content mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="img/logo_gold.png" alt="" class="h-7 w-auto">
      <span class="font-display text-lg font-700">SH <span class="text-bronze">Développement</span></span>
    </a>
    <a href="index.html" class="text-sm font-600 text-bronze hover:text-ink inline-flex items-center gap-1.5">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Accueil
    </a>
  </div>
</header>

<main class="max-w-content mx-auto px-5 sm:px-8 py-10">
  <div class="mb-8">
    <p class="text-bronze text-sm font-600 tracking-luxe uppercase mb-3">Réservez en direct</p>
    <h1 class="font-display text-4xl sm:text-5xl font-600">Nos locations en Bourgogne</h1>
    <p class="text-muted text-lg mt-3"><span id="count">…</span> logements d'exception, à réserver sans intermédiaire.</p>
  </div>

  <!-- Filtres -->
  <div class="sticky top-16 z-20 bg-cream/95 backdrop-blur py-4 -mx-5 px-5 sm:-mx-8 sm:px-8 border-b border-ecru/50 mb-8">
    <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
      <div class="relative flex-1 max-w-md">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="Rechercher une ville, un logement…" class="w-full rounded-full border border-ecru bg-cream pl-10 pr-4 py-2.5 text-sm outline-none focus:border-gold">
      </div>
      <div id="type-filters" class="flex flex-wrap gap-2"></div>
    </div>
  </div>

  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  <p id="empty" class="hidden text-center text-muted py-20">Aucun logement ne correspond à votre recherche.</p>
  <div id="loading" class="text-center text-muted py-20">Chargement du catalogue…</div>
</main>

<footer class="bg-ink text-cream/70 py-10 mt-10">
  <div class="max-w-content mx-auto px-5 sm:px-8 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm">
    <span>© 2026 SH Développement — Conciergerie en Bourgogne</span>
    <a href="mailto:contact@sh-developpement.fr" class="hover:text-gold">contact@sh-developpement.fr</a>
  </div>
</footer>

<script>
const TYPES = [['all','Tous'],['Studio','Studio'],['T2','T2'],['T3','T3'],['T4','T4'],['T5+','T5 et +']];
const typeOf = b => b===0?'Studio':({1:'T2',2:'T3',3:'T4'}[b]||'T5+');
let LISTINGS = [], q = '', activeType = 'all';
const eur = n => (Math.round(n)).toLocaleString('fr-FR') + ' €';
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

fetch('catalogue.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : null).then(d => {
  document.getElementById('loading').classList.add('hidden');
  if (!d || !d.listings) { document.getElementById('empty').classList.remove('hidden'); return; }
  LISTINGS = d.listings;
  document.getElementById('count').textContent = d.count || LISTINGS.length;
  renderTypes(); render();
}).catch(() => { document.getElementById('loading').textContent = 'Erreur de chargement.'; });

function renderTypes(){
  document.getElementById('type-filters').innerHTML = TYPES.map(([k,l]) => {
    const on = k === activeType;
    return `<button data-t="${k}" class="rounded-full border px-4 py-2 text-sm font-600 cursor-pointer ${on?'bg-ink text-cream border-ink':'bg-cream text-cocoa border-ecru hover:border-cocoa/40'}">${l}</button>`;
  }).join('');
}
function render(){
  const ql = q.trim().toLowerCase();
  const items = LISTINGS.filter(l => {
    if (activeType !== 'all' && typeOf(l.bedrooms) !== activeType) return false;
    if (ql && !((l.name||'').toLowerCase().includes(ql) || (l.city||'').toLowerCase().includes(ql))) return false;
    return true;
  });
  const grid = document.getElementById('grid');
  document.getElementById('empty').classList.toggle('hidden', items.length > 0);
  grid.innerHTML = items.map(l => `
    <a href="logement.html?id=${l.id}" class="grp block rounded-2xl overflow-hidden bg-cream border border-ecru/70 hover:shadow-xl hover:shadow-ink/10 hover:-translate-y-1">
      <div class="relative aspect-[4/3] overflow-hidden">
        <img src="${l.cover}" alt="${esc(l.name)}" loading="lazy" class="card-img absolute inset-0 w-full h-full object-cover">
        ${l.rating ? `<span class="absolute top-3 right-3 inline-flex items-center gap-1 rounded-full bg-cream/95 text-ink px-2.5 py-1 text-xs font-700 shadow"><svg width="12" height="12" viewBox="0 0 24 24" fill="#E0AE2C"><path d="m12 2 3 6.9 7.5.6-5.7 4.9 1.8 7.3L12 17.8 5.4 21.7l1.8-7.3L1.5 9.5 9 8.9z"/></svg>${(+l.rating).toFixed(1)}</span>` : ''}
      </div>
      <div class="p-4">
        <h3 class="font-display text-lg font-600 leading-tight truncate">${esc(l.name)}</h3>
        <p class="text-muted text-sm mt-0.5">${esc(l.city)} · ${l.guests} voy. · ${l.bedrooms?l.bedrooms+' ch.':'Studio'}</p>
        <p class="mt-2.5 text-ink"><span class="font-display text-xl font-700">${eur(l.price)}</span> <span class="text-muted text-sm">/ nuit</span></p>
      </div>
    </a>`).join('');
}
document.getElementById('q').addEventListener('input', e => { q = e.target.value; render(); });
document.getElementById('type-filters').addEventListener('click', e => {
  const b = e.target.closest('button[data-t]'); if (!b) return;
  activeType = b.dataset.t; renderTypes(); render();
});
</script>
</body>
</html>
