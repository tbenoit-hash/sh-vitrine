<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>ARIE × Tesla</title>
<style>body{font-family:-apple-system,Arial,sans-serif;background:#02060d;color:#dffbff;
display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;text-align:center}
.c{max-width:560px}h1{font-weight:300;letter-spacing:8px;color:#22d3ee}
code{display:block;word-break:break-all;background:#04101d;border:1px solid #22d3ee;
padding:14px;border-radius:10px;margin:16px 0;font-size:13px}
button{background:#22d3ee22;border:1px solid #22d3ee;color:#22d3ee;padding:10px 18px;border-radius:8px;cursor:pointer}</style>
</head><body><div class="c"><h1>ARIE × TESLA</h1>
<p>Connexion autorisée. Copiez ce code et collez-le à ARIE :</p>
<code id="code">…</code><button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">Copier</button>
<p id="st" style="opacity:.6;font-size:12px"></p>
<script>const p=new URLSearchParams(location.search);
document.getElementById('code').textContent=p.get('code')||'(aucun code reçu)';
document.getElementById('st').textContent='state: '+(p.get('state')||'—');</script>
</div></body></html>
